<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeyGen WebApp (Fixed)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            padding: 30px;
            margin-bottom: 20px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .mode-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        
        .mode-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            text-align: center;
        }
        
        .mode-btn:hover {
            border-color: #764ba2;
        }
        
        .mode-btn.active {
            background: #764ba2;
            color: white;
            border-color: #764ba2;
        }
        
        .form-section {
            display: none;
        }
        
        .form-section.active {
            display: block;
            animation: fadeIn 0.5s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #444;
        }
        
        textarea, select {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }
        
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        textarea:focus, select:focus {
            outline: none;
            border-color: #764ba2;
        }
        
        .button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .debug-panel {
            background: #f8f9fa;
            border: 2px dashed #dee2e6;
            border-radius: 10px;
            padding: 20px;
            margin-top: 30px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }
        
        .debug-title {
            color: #495057;
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .log {
            background: white;
            border: 1px solid #dee2e6;
            border-radius: 5px;
            padding: 10px;
            margin-bottom: 10px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 12px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        
        .log.info {
            border-left: 4px solid #17a2b8;
        }
        
        .log.success {
            border-left: 4px solid #28a745;
        }
        
        .log.error {
            border-left: 4px solid #dc3545;
        }
        
        .log.warning {
            border-left: 4px solid #ffc107;
        }
        
        .status {
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 HeyGen WebApp (Fixed)</h1>
        <p class="subtitle">Этот WebApp работает в браузере и отправляет данные напрямую на webhook</p>
        
        <div class="mode-selector">
            <button class="mode-btn active" data-mode="video-agent">Видео из текста</button>
            <button class="mode-btn" data-mode="image-to-video">Видео из фото</button>
            <button class="mode-btn" data-mode="translate">Перевести видео</button>
        </div>
        
        <!-- Video Agent Form -->
        <div class="form-section active" id="video-agent-form">
            <label for="text-input">Текст для видео:</label>
            <textarea id="text-input" placeholder="Введите текст для видео... (макс. 2000 символов)" maxlength="2000">Привет, это тестовое видео из WebApp</textarea>
            
            <label for="avatar-select">Аватар:</label>
            <select id="avatar-select">
                <option value="Adriana SuitSofa Front">👩 Adriana (стандартный)</option>
                <option value="Ethan SuitSofa Front">👨 Ethan (мужчина)</option>
                <option value="Lena Business Front">👩‍💼 Lena (бизнес)</option>
            </select>
        </div>
        
        <!-- Image to Video Form -->
        <div class="form-section" id="image-to-video-form">
            <label for="image-text">Текст для озвучки:</label>
            <textarea id="image-text" placeholder="Введите текст для озвучки фото..." maxlength="2000">Это фото с описанием</textarea>
            
            <div style="padding: 20px; background: #f8f9fa; border-radius: 10px; text-align: center; color: #6c757d; margin-bottom: 20px;">
                📸 В реальном WebApp здесь была бы загрузка фото
            </div>
        </div>
        
        <!-- Translate Form -->
        <div class="form-section" id="translate-form">
            <div style="padding: 20px; background: #f8f9fa; border-radius: 10px; text-align: center; color: #6c757d; margin-bottom: 20px;">
                🎥 В реальном WebApp здесь была бы загрузка видео
            </div>
            
            <label for="language-select">Язык перевода:</label>
            <select id="language-select">
                <option value="ru">🇷🇺 Русский</option>
                <option value="en">🇺🇸 Английский</option>
                <option value="es">🇪🇸 Испанский</option>
            </select>
        </div>
        
        <button class="button" id="send-btn">🚀 Отправить данные на Webhook</button>
        
        <div class="status" id="status"></div>
    </div>
    
    <div class="container debug-panel">
        <div class="debug-title">
            <span>🐛</span> Панель отладки (логи здесь и в Console браузера)
        </div>
        <div class="log info" id="debug-log">Готов к работе...</div>
        <div style="display: flex; gap: 10px;">
            <button class="button" id="clear-log" style="padding: 10px; font-size: 14px;">Очистить логи</button>
            <button class="button" id="test-webhook" style="padding: 10px; font-size: 14px;">Тест Webhook</button>
        </div>
    </div>
    
    <script>
        // === КОНФИГУРАЦИЯ ===
        const WEBHOOK_URL = 'https://5773171-do48756.twc1.net/webhook/heigen-logging';
        // Замени на свой webhook URL, если нужно
        
        // === ЭМУЛЯЦИЯ Telegram WebApp SDK ===
        const Telegram = {
            WebApp: {
                initData: 'query_id=AAHdF6IQAAAAAJ0MhCIhBKmN&user=%7B%22id%22%3A371324849%2C%22first_name%22%3A%22Big%2AOracle%22%2C%22username%22%3A%22BigOracle%22%7D&auth_date=1772743604&hash=abc123',
                initDataUnsafe: {
                    user: { id: 371324849, first_name: 'Big*Oracle', username: 'BigOracle' }
                },
                sendData: function(data) {
                    console.log('📤 Telegram.WebApp.sendData() called with:', data);
                    // В реальном Telegram данные отправляются автоматически
                    // Здесь эмулируем отправку через fetch
                    sendToWebhook(data);
                },
                ready: function() { console.log('✅ Telegram.WebApp.ready()'); },
                expand: function() { console.log('📱 Telegram.WebApp.expand()'); }
            }
        };
        
        // === ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ===
        let currentMode = 'video-agent';
        let logEntries = [];
        
        // === DOM ЭЛЕМЕНТЫ ===
        const modeButtons = document.querySelectorAll('.mode-btn');
        const formSections = document.querySelectorAll('.form-section');
        const sendBtn = document.getElementById('send-btn');
        const debugLog = document.getElementById('debug-log');
        const statusDiv = document.getElementById('status');
        const clearLogBtn = document.getElementById('clear-log');
        const testWebhookBtn = document.getElementById('test-webhook');
        
        // === ФУНКЦИИ ЛОГИРОВАНИЯ ===
        function addLog(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const entry = `[${timestamp}] ${message}`;
            logEntries.push({ message: entry, type });
            
            // Обновляем панель логов
            debugLog.textContent = logEntries.map(e => e.message).join('\n');
            debugLog.className = `log ${type}`;
            
            // Также в консоль браузера
            console.log(`[${type.toUpperCase()}] ${message}`);
        }
        
        function clearLog() {
            logEntries = [];
            debugLog.textContent = 'Логи очищены';
            debugLog.className = 'log info';
        }
        
        // === ОТПРАВКА ДАННЫХ НА WEBHOOK ===
        async function sendToWebhook(data) {
            addLog(`Отправка данных на webhook: ${WEBHOOK_URL}`, 'info');
            
            // Формируем данные для отправки
            const payload = {
                type: currentMode,
                text: '',
                file_id: null,
                settings: {}
            };
            
            // Заполняем в зависимости от режима
            switch (currentMode) {
                case 'video-agent':
                    payload.text = document.getElementById('text-input').value.trim();
                    payload.settings.avatar = document.getElementById('avatar-select').value;
                    payload.settings.orientation = 'portrait';
                    break;
                    
                case 'image-to-video':
                    payload.text = document.getElementById('image-text').value.trim();
                    payload.file_id = 'demo_photo_file_id';
                    payload.settings.voice = 'default';
                    break;
                    
                case 'translate':
                    payload.file_id = 'demo_video_file_id';
                    payload.settings.language = document.getElementById('language-select').value;
                    break;
            }
            
            addLog(`Данные: ${JSON.stringify(payload, null, 2)}`, 'info');
            
            // В реальном WebApp Telegram сам отправляет данные
            // Здесь эмулируем отправку через fetch
            try {
                addLog('Отправка POST запроса...', 'warning');
                
                // Эмулируем структуру Telegram update
                const telegramUpdate = {
                    update_id: Math.floor(Math.random() * 1000000),
                    message: {
                        message_id: Math.floor(Math.random() * 1000),
                        from: Telegram.WebApp.initDataUnsafe.user,
                        chat: { id: Telegram.WebApp.initDataUnsafe.user.id, type: 'private' },
                        date: Math.floor(Date.now() / 1000),
                        web_app_data: {
                            data: JSON.stringify(payload)
                        }
                    }
                };
                
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(telegramUpdate)
                });
                
                const responseText = await response.text();
                
                if (response.ok) {
                    addLog(`✅ Webhook ответил: ${response.status}`, 'success');
                    showStatus('Данные отправлены! Проверь Executions в n8n.', 'success');
                } else {
                    addLog(`❌ Ошибка webhook: ${response.status} - ${responseText}`, 'error');
                    showStatus(`Ошибка: ${response.status}`, 'error');
                }
                
            } catch (error) {
                addLog(`❌ Ошибка отправки: ${error.message}`, 'error');
                showStatus(`Ошибка сети: ${error.message}`, 'error');
            }
        }
        
        // === ПОКАЗАТЬ СТАТУС ===
        function showStatus(message, type) {
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
            
            // Автоочистка через 5 секунд
            setTimeout(() => {
                statusDiv.className = 'status';
            }, 5000);
        }
        
        // === ТЕСТ WEBHOOK ===
        async function testWebhook() {
            addLog('🧪 Тестирование webhook...', 'warning');
            
            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'HEAD',
                    timeout: 5000
                }).catch(e => ({ ok: false, status: 'timeout' }));
                
                if (response.ok) {
                    addLog(`✅ Webhook доступен: ${response.status}`, 'success');
                } else {
                    addLog(`⚠️ Webhook недоступен: ${response.status}`, 'warning');
                }
            } catch (error) {
                addLog(`❌ Ошибка теста: ${error.message}`, 'error');
            }
        }
        
        // === ИНИЦИАЛИЗАЦИЯ ===
        function init() {
            addLog('🚀 WebApp инициализирован', 'success');
            addLog(`Режим: ${currentMode}`, 'info');
            addLog(`Webhook URL: ${WEBHOOK_URL}`, 'info');
            
            // Эмулируем инициализацию Telegram
            Telegram.WebApp.ready();
            Telegram.WebApp.expand();
            
            // Переключение режимов
            modeButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    modeButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    formSections.forEach(section => section.classList.remove('active'));
                    
                    currentMode = btn.dataset.mode;
                    document.getElementById(`${currentMode}-form`).classList.add('active');
                    
                    addLog(`Переключен режим: ${currentMode}`, 'info');
                });
            });
            
            // Отправка данных
            sendBtn.addEventListener('click', () => {
                addLog('🔄 Отправка данных...', 'warning');
                // Используем эмулированный Telegram SDK
                Telegram.WebApp.sendData({ test: 'data' });
            });
            
            // Очистка логов
            clearLogBtn.addEventListener('click', clearLog);
            
            // Тест webhook
            testWebhookBtn.addEventListener('click', testWebhook);
            
            // Автотест webhook при загрузке
            setTimeout(testWebhook, 1000);
        }
        
        // Запуск при загрузке
        document.addEventListener('DOMContentLoaded', init);
        
        // Экспортируем для отладки в консоли
        window.debug = {
            addLog,
            clearLog,
            sendToWebhook,
            testWebhook,
            Telegram
        };
        
        addLog('💡 Для отладки в консоли браузера используй window.debug', 'info');
    </script>
</body>
</html>
