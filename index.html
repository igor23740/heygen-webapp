<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>VideoGenie — Меню</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{--bg:#0b0b0e;--surface:#161619;--card:#1e1e24;--card-border:#2a2a32;--accent:#2ec4b6;--accent-dark:#239e93;--accent-glow:rgba(46,196,182,0.18);--text:#f2f2f4;--text-dim:#9a9aa6;--radius:18px;--radius-sm:14px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;-webkit-font-smoothing:antialiased}
.app{max-width:430px;margin:0 auto;min-height:100vh;position:relative}

.hero{padding:40px 20px 28px;text-align:center}
.hero-logo{font-size:48px;margin-bottom:12px}
.hero h1{font-size:26px;font-weight:800;line-height:1.25;margin-bottom:14px}
.hero .accent-word{color:var(--accent)}
.hero p{font-size:14px;line-height:1.5;color:var(--text-dim);max-width:340px;margin:0 auto}

.nav{padding:16px 16px 20px;display:flex;flex-direction:column;gap:10px}

.nav-btn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:16px 14px;
  border:1px solid var(--card-border);border-radius:var(--radius);
  background:var(--card);color:var(--text);
  font-size:16px;font-weight:700;
  cursor:pointer;
  position:relative;overflow:hidden;
  -webkit-user-select:none;user-select:none;
  touch-action:manipulation;
  box-shadow:0 2px 8px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.04);
  transform:translateY(0) scale(1);
  transition:transform .3s cubic-bezier(.4,0,.2,1),box-shadow .3s cubic-bezier(.4,0,.2,1),border-color .3s ease;
  text-decoration:none;
}
.nav-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--accent),var(--accent-dark));
  opacity:0;border-radius:var(--radius);
  transition:opacity .3s ease-out;
}
.nav-btn .nav-btn-text{position:relative;z-index:1;transition:color .3s ease-out}

.nav-btn.hovered{
  transform:translateY(-3px) scale(1);
  box-shadow:0 6px 20px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.05);
  border-color:#3a3a44;
}
.nav-btn.lit{
  border-color:var(--accent);
  box-shadow:0 4px 24px var(--accent-glow),0 2px 8px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.06);
}
.nav-btn.lit::before{opacity:1;transition:opacity 0s}
.nav-btn.lit .nav-btn-text{color:#fff;transition:color 0s}
.nav-btn.pressed{
  transform:translateY(1px) scale(.97);
  box-shadow:0 1px 3px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.02);
  transition:transform .08s ease,box-shadow .08s ease,border-color .08s ease;
}
.nav-btn.lit.pressed{
  transform:translateY(1px) scale(.97);
  box-shadow:0 1px 6px var(--accent-glow),0 1px 3px rgba(0,0,0,.3);
}

::-webkit-scrollbar{width:0;height:0}
@keyframes rise{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.hero{animation:rise .6s ease-out}
.nav{animation:rise .6s ease-out .1s both}
</style>
</head>
<body>
<div class="app" id="app">

  <section class="hero" id="top">
    <div class="hero-logo">🎬</div>
    <h1>VideoGenie<br>теперь твоя<br><span class="accent-word">суперсила</span></h1>
    <p>Создавай маркетинговые, обучающие и продающие видео из единого рабочего пространства — быстро, качественно и без камеры.</p>
  </section>

  <nav class="nav" id="nav">
    <button class="nav-btn" data-href="text-to-video.html"><span class="nav-btn-text">🎤 Текст → Видео</span></button>
    <button class="nav-btn" data-href="photo-to-video.html"><span class="nav-btn-text">📸 Фото → Видео</span></button>
    <button class="nav-btn" data-href="product-ads.html"><span class="nav-btn-text">🛒 Продуктовая реклама</span></button>
    <button class="nav-btn" data-href="ugc-ads.html"><span class="nav-btn-text">🔥 UGC-ролики</span></button>
    <button class="nav-btn" data-href="ai-models.html"><span class="nav-btn-text">🤖 AI-модели</span></button>
  </nav>

</div>

<script>
const tg = window.Telegram && window.Telegram.WebApp;
if (tg) { tg.ready(); tg.expand(); tg.BackButton.hide(); }

const btns = document.querySelectorAll('.nav-btn');

btns.forEach(b => {
  let navigated = false;

  function navigate() {
    if (navigated) return;
    navigated = true;
    const href = b.dataset.href;
    if (href) window.location.href = href;
  }

  b.addEventListener('touchstart', () => {
    navigated = false;
    b.classList.add('lit', 'pressed');
  }, { passive: true });

  b.addEventListener('touchend', (e) => {
    e.preventDefault();
    b.classList.remove('pressed');
    navigate();
  });

  b.addEventListener('touchcancel', () => {
    b.classList.remove('lit', 'pressed');
  });

  b.addEventListener('mouseenter', () => { b.classList.add('hovered'); });
  b.addEventListener('mouseleave', () => { b.classList.remove('hovered', 'lit', 'pressed'); });

  b.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    navigated = false;
    b.classList.add('lit', 'pressed');
  });

  b.addEventListener('mouseup', (e) => {
    if (e.button !== 0) return;
    b.classList.remove('pressed');
    navigate();
  });

  b.addEventListener('click', (e) => { e.preventDefault(); });
});
</script>
</body>
</html>
